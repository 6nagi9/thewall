<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join my circle — Known</title>
  <meta property="og:title" content="Join my circle on Known">
  <meta property="og:description" content="A small group where we trade honest, structured feedback. Tap to join with the code.">
  <meta property="og:image" content="https://the-wall-app-260609.web.app/assets/icon.png">
  <meta name="twitter:card" content="summary">
  <style>
    :root { --ink:#13100D; --card:#201B16; --line:#38302A; --clay:#E07A5F;
            --paper:#FAF5EC; --muted:#B5A99B; --sage:#93B873; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center;
           justify-content:center; background:var(--ink); color:var(--paper);
           font-family: Georgia, 'Times New Roman', serif; }
    main { max-width:460px; padding:40px 28px; text-align:center; }
    h1 { font-size:1.9rem; margin:.2em 0; }
    p  { color:var(--muted); line-height:1.55; }
    .code { font-size:2rem; letter-spacing:.35em; color:var(--sage);
            background:var(--card); border:1px solid var(--line);
            border-radius:16px; padding:16px 10px 16px 20px; margin:22px 0; }
    .cta { display:inline-block; background:var(--clay); color:var(--ink);
           padding:14px 26px; border-radius:14px; text-decoration:none; font-weight:bold;
           font-size:1.05rem; }
    small { display:block; margin-top:22px; color:var(--muted); opacity:.8; }
  </style>
</head>
<body>
<main>
  <h1>You're invited to a circle</h1>
  <p>Circles are small groups on Known — your flat, your team, your class —
     where members trade honest, structured feedback.</p>
  <div class="code" id="code">······</div>
  <a class="cta" href="/">Join in the app</a>
  <small>Open the app → Discover → Circles → Join by code</small>
</main>
<script>
  // Show the join code from the URL (/c/ABC123) for manual entry when the
  // app link doesn't auto-open.
  var parts = location.pathname.split('/').filter(Boolean);
  var code = parts[parts.length - 1] || '';
  if (/^[A-Za-z0-9]{6}$/.test(code)) {
    document.getElementById('code').textContent = code.toUpperCase();
  }
</script>
</body>
</html>
