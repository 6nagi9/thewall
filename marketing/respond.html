<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>They want your honest feedback — Known</title>
  <meta property="og:title" content="I'd love your honest feedback">
  <meta property="og:description" content="2 minutes, structured and kind — you can stay anonymous. On Known, the consent-first feedback app.">
  <meta property="og:image" content="https://the-wall-app-260609.web.app/assets/icon.png">
  <meta name="twitter:card" content="summary">
  <style>
    :root { --ink:#13100D; --card:#201B16; --line:#38302A; --clay:#E07A5F;
            --paper:#FAF5EC; --muted:#B5A99B; --sage:#93B873; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center;
           justify-content:center; background:var(--ink); color:var(--paper);
           font-family: Georgia, 'Times New Roman', serif; }
    main { max-width:460px; padding:40px 28px; text-align:center; }
    .bricks { display:grid; grid-template-columns:repeat(2,34px); gap:6px;
              justify-content:center; margin-bottom:26px; }
    .bricks div { width:34px; height:34px; border-radius:9px; background:var(--clay); }
    h1 { font-size:1.9rem; margin:.2em 0; }
    p  { color:var(--muted); line-height:1.55; }
    ul { text-align:left; color:var(--muted); line-height:1.7; }
    .cta { display:inline-block; margin-top:14px; background:var(--clay); color:var(--ink);
           padding:14px 26px; border-radius:14px; text-decoration:none; font-weight:bold;
           font-size:1.05rem; }
    small { display:block; margin-top:22px; color:var(--muted); opacity:.8; }
  </style>
</head>
<body>
<main>
  <div class="bricks"><div></div><div></div><div></div><div></div></div>
  <h1>They asked for your honest take</h1>
  <p>Someone you know wants structured feedback — it takes about 2 minutes:</p>
  <ul>
    <li>Rate a few dimensions (1–5 bricks)</li>
    <li>Pick what stands out about them</li>
    <li>Stay anonymous if you prefer</li>
  </ul>
  <a class="cta" href="/">Give feedback in the app</a>
  <small>Consent-first · moderated · no phone numbers exchanged</small>
</main>
</body>
</html>
